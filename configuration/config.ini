[Server]
; 监听地址（0.0.0.0 表示所有接口，127.0.0.1 仅本地，GB26875目前仅支持IPV4）
host = 127.0.0.1
; 监听端口
port = 7358
; 最大并发连接数（超过此数的连接将被拒绝）
maxConnections = 1000
; 挂起连接队列大小（操作系统层）
backlog = 128

; === 连接超时与保活 ===
; 新连接握手超时（毫秒，0 表示无限制）
handshakeTimeout = 10000
; 空闲连接超时（秒，超过此时间未通信自动断开）
idleTimeout = 300
; 是否启用 TCP keep-alive
keepAlive = true
; 是否禁用 Nagle 算法（降低延迟）
tcpNoDelay = true

; === SSL/TLS 加密 ===
; 是否启用 SSL
sslEnabled = false
; SSL 证书文件路径（PEM 格式）
; sslCertificate = certs/server.crt
; SSL 私钥文件路径
; sslPrivateKey = certs/server.key
; 是否要求客户端提供证书（双向认证）
; sslRequireClientCert = false
; 允许的 SSL 协议版本（如 TLSv1.2,TLSv1.3）
; sslProtocols = TLSv1.2,TLSv1.3

; === 性能与资源 ===
; 工作线程数（通常为 CPU 核心数，0 表示自动）
; workerThreads = 4
; 每个连接接收缓冲区大小（字节）
; recvBufferSize = 65536
; 每个连接发送缓冲区大小（字节）
; sendBufferSize = 65536
; 最大内存池大小（MB，0 表示无限制）
; maxMemoryPool = 256

; === 限流与保护 ===
; 单个 IP 最大连接数（防止 DOS 攻击）
maxConnectionsPerIP = 20
; 全局数据接收速率限制（字节/秒，0 表示不限）
globalRateLimit = 0
; 每个连接数据接收速率限制（字节/秒）
perConnectionRateLimit = 0

; === 日志配置 ===(配合spdLog操作)
; 日志级别：debug, info, warning, error, critical
logLevel = info
; 日志文件路径（留空表示不写入文件）
logFile = logs/server.log
; 是否输出到控制台
logToConsole = true
; 是否在日志中包含日期时间
logTimestamp = true

; === 高级选项 ===
; 是否启用压缩（如果应用层支持）
; enableCompression = false
; 服务名称（用于日志或协议标识）
; serviceName = MyTCPServer
; 调试模式（输出详细调试信息）
; debugMode = false


[RemoteHost]
; 服务器地址（IP 或域名）
host = 127.0.0.1
; 服务器端口
port = 8080
; 连接超时（毫秒，0 表示无限等待）
connectTimeout = 5000
; 读取超时（毫秒，0 表示无限等待）
readTimeout = 10000
; 写入超时（毫秒，0 表示无限等待）
writeTimeout = 5000

; === 重连机制 ===
; 是否自动重连（true/false）
autoReconnect = true
; 重连间隔（毫秒）
reconnectInterval = 3000
; 最大重连尝试次数（0 表示无限次）
maxReconnectAttempts = 5

; === 保活与心跳 ===
; 心跳间隔（秒，0 表示不发送心跳）
heartbeatInterval = 30
; 无数据响应超时（秒，超过此时间未收到任何数据则认为连接失效）
responseTimeout = 60

; === SSL/TLS 加密 ===
; 是否启用 SSL
; sslEnabled = false
; 客户端证书文件（如果需要双向认证）
; sslCertificate = client.crt
; 客户端私钥文件
; sslPrivateKey = client.key
; 是否忽略证书错误（仅用于测试环境，生产环境建议 false）
; sslIgnoreErrors = false

; === 日志配置 ===(配合spdLog操作)
; 日志级别：debug, info, warning, error, critical
logLevel = info
; 日志文件路径（留空表示不写入文件）
logFile = logs/server.log
; 是否输出到控制台
logToConsole = true
; 是否在日志中包含日期时间
logTimestamp = true

; === 高级选项 ===
; 本地绑定地址（用于多网卡场景，通常留空）
localAddress = 
; 本地绑定端口（0 表示自动分配）
localPort = 0
; 是否启用 TCP keep-alive
keepAlive = true
; 是否禁用 Nagle 算法（降低延迟）
tcpNoDelay = true
; 接收缓冲区大小（字节，0 表示系统默认）
recvBufferSize = 0
; 发送缓冲区大小（字节，0 表示系统默认）
sendBufferSize = 0
; 代理服务器类型：none, http, socks5（留空表示无代理）
proxyType = none
; 代理服务器地址
proxyHost = 
; 代理服务器端口
proxyPort = 0
; 代理认证用户名（可选）
proxyUser = 
; 代理认证密码（可选）
proxyPass = 

; === 协议相关 ===
; 协议版本（用于兼容不同服务器版本）
protocolVersion = 1.0
; 是否启用压缩（如果协议支持）
enableCompression = false
; 调试模式（true 会输出详细日志）
debugMode = false


[Thread]
; 工作线程池大小（通常设置为 CPU 核心数 * 2）
poolSize = 8
; 任务队列最大长度
queueSize = 1000

[Database]
; 数据库类型：mysql, postgresql, sqlite
type = mysql
host = localhost
port = 3306
name = mydb
user = dbuser
password = dbpass123
; 连接池大小
connectionPool = 10

[Paths]
; 上传文件存储目录
uploadDir = /data/uploads
; 临时文件目录
tempDir = /tmp/myserver
; 静态资源目录（如果作为 Web 服务器）
staticDir = /var/www/html

[Security]
; 是否启用 SSL/TLS
enableSSL = false
; SSL 证书文件路径（相对于可执行文件或绝对路径）
sslCertificate = certs/server.crt
sslPrivateKey = certs/server.key
; 是否启用客户端身份认证
clientAuth = false

[Performance]
; 网络缓冲区大小（字节）
socketBufferSize = 65536
; 内存缓存大小（MB）
cacheSize = 256
; 是否启用压缩
enableCompression = true

[Custom]
; 自定义开关，可根据业务需求添加
debugMode = false
apiVersion = 1.2